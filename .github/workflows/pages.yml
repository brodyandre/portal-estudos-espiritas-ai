name: Publish Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      VITE_APP_MODE: demo
      VITE_API_URL: ""
      VITE_SHOW_REAL_MEET_LINK: "false"
      VITE_ENABLE_ADMIN_FEATURES: "false"
      VITE_ENABLE_TEACHER_FEATURES: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:web

      - name: Prepare static preview fallbacks
        run: |
          cp apps/web/dist/index.html apps/web/dist/404.html
          printf "User-agent: *\nDisallow: /\n" > apps/web/dist/robots.txt

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
